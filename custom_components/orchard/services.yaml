reconcile:
  name: Reconcile
  description: Rebuild the Orchard model from current Home Assistant state.

sync_bridge:
  name: Sync Apple Home bridge
  description: Create or update the Orchard-managed Apple Home bridge from accepted accessories.

accept_change:
  name: Accept change
  description: Accept a pending accessory review item.
  fields:
    entity_id:
      name: Accessory
      description: Source entity for the accessory.
      required: true
      selector:
        entity: {}

ignore:
  name: Ignore accessory
  description: Hide an accessory from Orchard until manually reviewed.
  fields:
    entity_id:
      name: Accessory
      description: Source entity for the accessory.
      required: true
      selector:
        entity: {}

unignore:
  name: Unignore accessory
  description: Return an ignored accessory to Orchard review.
  fields:
    entity_id:
      name: Accessory
      description: Source entity for the accessory.
      required: true
      selector:
        entity: {}
